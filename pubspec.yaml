name: flutter_project_2
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^13.2.0
  flutter_svg: ^2.0.16
  dotted_border: ^3.1.0
  dio: ^5.9.2
  lottie: ^3.3.2
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0
  sqflite: ^2.4.2
  path: ^1.9.1
  get_it: ^9.2.1
  easy_localization: ^3.0.8
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
     - assets/images/
     - assets/svgs/
     - assets/lottie/
     - assets/translations/
  fonts:
    - family: NeueMontreal
      fonts:
        - asset: assets/fonts/NeueMontreal-Light.otf
          weight: 300
        - asset: assets/fonts/NeueMontreal-Regular.otf
          weight: 400
        - asset: assets/fonts/NeueMontreal-Medium.otf
          weight: 500
        - asset: assets/fonts/NeueMontreal-Bold.otf
          weight: 700

